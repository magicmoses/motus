name: Daily Pipeline

# Runs the full crawl directly in Actions — no Railway dependency.
# Idempotency: researcher + normalizer dedupe on DOI / source_id / title hash,
# so re-runs never duplicate records.
# Cost bound: writer + tagger process at most 100 papers per run (Haiku).

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch:  # manual runs

concurrency:
  group: daily-pipeline
  cancel-in-progress: false  # never overlap two pipeline runs

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python run_pipeline.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}

      - name: Upload cost log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-costs-${{ github.run_id }}
          path: apps/worker/logs/pipeline_costs.jsonl
          if-no-files-found: ignore
          retention-days: 30
